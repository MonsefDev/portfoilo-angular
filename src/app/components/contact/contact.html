<section id="contact" class="relative bg-slate-50 dark:bg-dark-900 overflow-hidden">
  <div class="orb orb-2" style="opacity:0.5"></div>

  <div class="section-container relative z-10">

    <div class="reveal text-center mb-14">
      <p class="section-label mb-3">{{ tr.t('contact.section_label') }}</p>
      <h2 class="section-title text-slate-900 dark:text-white">{{ tr.t('contact.title') }}</h2>
      <p class="text-slate-500 mt-3 max-w-xl mx-auto text-sm">{{ tr.t('contact.subtitle') }}</p>
    </div>

    <div class="grid lg:grid-cols-5 gap-10 max-w-6xl mx-auto">

      <!-- Info -->
      <div class="lg:col-span-2 space-y-4 reveal reveal-left">
        <div class="glass-card p-5 flex items-center gap-4">
          <div class="w-11 h-11 rounded-xl gradient-bg flex items-center justify-center text-white flex-shrink-0">📅</div>
          <div>
            <p class="font-semibold text-white text-sm">{{ tr.t('contact.availability') }}</p>
            <p class="text-xs text-emerald-400 font-mono mt-0.5">Open to opportunities</p>
          </div>
        </div>
        <div class="glass-card p-5 flex items-center gap-4">
          <div class="w-11 h-11 rounded-xl bg-cyan-500/15 border border-cyan-500/20 flex items-center justify-center text-lg flex-shrink-0">📍</div>
          <div>
            <p class="font-semibold text-white text-sm">{{ tr.t('contact.location') }}</p>
            <p class="text-xs text-slate-500 mt-0.5">{{ tr.t('contact.open_to') }}</p>
          </div>
        </div>
        <div class="glass-card p-5">
          <p class="text-xs font-mono font-semibold uppercase tracking-wider text-slate-500 mb-4">Links</p>
          <div class="space-y-3">
            <a href="mailto:laarajmoncif@gmail.com"
               class="flex items-center gap-3 text-sm text-slate-400 hover:text-primary-400 transition-colors">
              <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              laarajmoncif&#64;gmail.com
            </a>
            <a href="https://github.com/monsefdev" target="_blank" rel="noopener"
               class="flex items-center gap-3 text-sm text-slate-400 hover:text-primary-400 transition-colors">
              <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
              </svg>
              github.com/monsefdev
            </a>
          </div>
        </div>
      </div>

      <!-- Form -->
      <form class="lg:col-span-3 reveal reveal-right glass-card p-8 space-y-5"
            (ngSubmit)="submit()" #contactForm="ngForm">

        <div class="grid sm:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">{{ tr.t('contact.name_label') }}</label>
            <input type="text" name="name" required [(ngModel)]="name"
                   [placeholder]="tr.t('contact.name_placeholder')"
                   class="w-full px-4 py-3 rounded-xl border bg-white/4 text-white placeholder:text-slate-600
                          border-white/8 outline-none text-sm transition-all duration-200
                          focus:border-primary-500/50 focus:ring-2 focus:ring-primary-500/15"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">{{ tr.t('contact.email_label') }}</label>
            <input type="email" name="email" required [(ngModel)]="email"
                   [placeholder]="tr.t('contact.email_placeholder')"
                   class="w-full px-4 py-3 rounded-xl border bg-white/4 text-white placeholder:text-slate-600
                          border-white/8 outline-none text-sm transition-all duration-200
                          focus:border-primary-500/50 focus:ring-2 focus:ring-primary-500/15"/>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">{{ tr.t('contact.subject_label') }}</label>
          <input type="text" name="subject" [(ngModel)]="subject"
                 [placeholder]="tr.t('contact.subject_placeholder')"
                 class="w-full px-4 py-3 rounded-xl border bg-white/4 text-white placeholder:text-slate-600
                        border-white/8 outline-none text-sm transition-all duration-200
                        focus:border-primary-500/50 focus:ring-2 focus:ring-primary-500/15"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">{{ tr.t('contact.message_label') }}</label>
          <textarea rows="5" name="message" required [(ngModel)]="message"
                    [placeholder]="tr.t('contact.message_placeholder')"
                    class="w-full px-4 py-3 rounded-xl border bg-white/4 text-white placeholder:text-slate-600
                           border-white/8 outline-none text-sm resize-none transition-all duration-200
                           focus:border-primary-500/50 focus:ring-2 focus:ring-primary-500/15">
          </textarea>
        </div>

        <button type="submit" [disabled]="!contactForm.valid"
                class="w-full btn-gradient justify-center py-4 text-sm
                       disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:scale-100">
          @if (sent()) {
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            Envoyé !
          } @else {
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
            {{ tr.t('contact.send') }}
          }
        </button>
      </form>

    </div>
  </div>
</section>
